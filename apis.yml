name: Mangomint
kind: company
description: >-
  Mangomint is salon and spa business management software covering scheduling,
  point of sale, payroll, marketing, memberships, and forms. Mangomint has no
  public, self-service developer portal, no published REST/GraphQL API
  reference, and no OpenAPI specification. Its only documented programmatic
  surface is outbound webhooks (appointment booked/updated/canceled, sale
  completed, form submitted) that Mangomint staff configure by hand over chat
  support once a customer supplies a receiving endpoint URL; payload schemas
  and authentication are not published. A small set of one-off, vendor-built
  integrations (Shopify, Mailchimp, Docovia, Doxy.me, WaiverForever, Gift Up!)
  are toggled on from the Mangomint dashboard, and there is no listed Zapier
  app. This entry is documented as a stub because there is no public API to
  catalog.
